services:
  postgres:
    image: postgres:16-alpine
    container_name: rlr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rlr
      POSTGRES_PASSWORD: rlr_dev_password
      POSTGRES_DB: revenue_leakage_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rlr -d revenue_leakage_radar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rlr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
