services:
  postgres:
    image: postgres:16-alpine
    container_name: rlr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rlr
      POSTGRES_PASSWORD: rlr_dev_password
      POSTGRES_DB: revenue_leakage_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rlr -d revenue_leakage_radar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rlr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rlr-api-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://rlr:rlr_dev_password@postgres:5432/revenue_leakage_radar
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker -l info

volumes:
  postgres_data:
