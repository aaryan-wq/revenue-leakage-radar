name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main, "cursor/**"]
  workflow_dispatch:

env:
  DATABASE_URL: postgresql://rlr:rlr_dev_password@localhost:5432/revenue_leakage_radar
  REDIS_URL: redis://localhost:6379/0
  CELERY_TASK_ALWAYS_EAGER: "true"
  DEV_UNLOCK_ENABLED: "true"
  ENVIRONMENT: development

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rlr
          POSTGRES_PASSWORD: rlr_dev_password
          POSTGRES_DB: revenue_leakage_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rlr -d revenue_leakage_radar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API dependencies
        run: |
          python -m venv apps/api/.venv
          apps/api/.venv/bin/pip install -r apps/api/requirements.txt
      - name: Run migrations
        run: cd apps/api && .venv/bin/alembic upgrade head
      - name: Pytest
        run: cd apps/api && .venv/bin/pytest -q

  web-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          SKIP_ENV_VALIDATION: "true"

  benchmark-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rlr
          POSTGRES_PASSWORD: rlr_dev_password
          POSTGRES_DB: revenue_leakage_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rlr -d revenue_leakage_radar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API dependencies
        run: |
          python -m venv apps/api/.venv
          apps/api/.venv/bin/pip install -r apps/api/requirements.txt
      - name: Run migrations
        run: cd apps/api && .venv/bin/alembic upgrade head
      - name: Engine benchmark gate
        run: apps/api/.venv/bin/python scripts/benchmark_audit_performance.py --sizes 1000 --seed 42
      - name: Ingestion benchmark gate
        run: apps/api/.venv/bin/python scripts/benchmark_ingestion.py --sizes 500 1000 --max-ingest-ms 15000

  e2e-smoke:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rlr
          POSTGRES_PASSWORD: rlr_dev_password
          POSTGRES_DB: revenue_leakage_radar
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Install API dependencies
        run: |
          python -m venv apps/api/.venv
          apps/api/.venv/bin/pip install -r apps/api/requirements.txt
          cd apps/api && .venv/bin/alembic upgrade head
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E smoke (Tier 0)
        run: npx playwright test e2e/upload.spec.ts e2e/navigation.spec.ts e2e/stress.spec.ts --grep-invert golden
        env:
          CI: "true"
          PLAYWRIGHT_SKIP_WEBSERVER: ""
          NEXT_PUBLIC_API_URL: http://localhost:8000
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

  e2e-golden:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rlr
          POSTGRES_PASSWORD: rlr_dev_password
          POSTGRES_DB: revenue_leakage_radar
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Install API dependencies
        run: |
          python -m venv apps/api/.venv
          apps/api/.venv/bin/pip install -r apps/api/requirements.txt
          cd apps/api && .venv/bin/alembic upgrade head
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Golden audit E2E
        run: npx playwright test e2e/golden-audit.spec.ts
        env:
          CI: "true"
          NEXT_PUBLIC_API_URL: http://localhost:8000
